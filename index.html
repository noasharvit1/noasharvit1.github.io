<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Sharvit | Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #2d3436;
            --accent-color: #0984e3;
            --secondary-color: #636e72;
            --border-color: #dfe6e9;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        #content {
            max-width: 850px;
            width: 90%;
            margin: 60px 0;
            line-height: 1.8;
        }

        /* עיצוב כותרות מה-README */
        h1 { font-size: 2.8rem; font-weight: 600; margin-bottom: 10px; color: #000; }
        h2 { font-size: 1.8rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 40px; }
        h3 { color: var(--accent-color); }

        /* עיצוב רשימות וטקסט */
        ul { padding-right: 20px; }
        li { margin-bottom: 8px; }
        
        hr { border: 0; border-top: 1px solid var(--border-color); margin: 30px 0; }

        /* התאמה לתמונות או באדג'ים אם יש ב-README */
        img { max-width: 100%; height: auto; border-radius: 4px; }

        /* עיצוב לינקים */
        a { color: var(--accent-color); text-decoration: none; border-bottom: 1px transparent; transition: 0.2s; }
        a:hover { border-bottom: 1px solid var(--accent-color); }

        /* טעינה - Loader */
        #loading { text-align: center; margin-top: 100px; color: var(--secondary-color); }
    </style>
</head>
<body>

    <div id="loading">טוען תוכן מקצועי...</div>
    <div id="content"></div>

    <script>
        async function loadReadme() {
            // כאן את מכניסה את הכתובת של קובץ ה-README הגולמי שלך
            // בדרך כלל: https://raw.githubusercontent.com/[USER]/[REPO]/main/README.md
            const readmeUrl = 'README.md'; 

            try {
                const response = await fetch(readmeUrl);
                if (!response.ok) throw new Error('לא ניתן היה למצוא את קובץ ה-README');
                
                const markdownText = await response.text();
                
                // הפיכת ה-Markdown ל-HTML והזרקה לדף
                document.getElementById('content').innerHTML = marked.parse(markdownText);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerHTML = 'שגיאה בטעינת הקובץ. וודאי ש-README.md נמצא באותה תיקייה.';
                console.error(error);
            }
        }

        loadReadme();
    </script>

</body>
</html>
