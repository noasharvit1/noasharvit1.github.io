<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Sharvit - Personal Page</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* This is your original styling from the first version */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .container {
            width: 80%;
            max-width: 900px;
            background: #fff;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        /* Custom styling for the Markdown content once it's loaded */
        #dynamic-content h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        #dynamic-content h2 { color: #2980b9; margin-top: 25px; }
        #dynamic-content hr { border: 0; height: 1px; background: #eee; margin: 20px 0; }
        #dynamic-content ul { line-height: 1.8; }
        #dynamic-content a { color: #3498db; text-decoration: none; }
        #dynamic-content a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div id="dynamic-content">
            Loading information...
        </div>
    </div>

    <script>
        async function loadContent() {
            try {
                // Fetching the content from your README.md file
                const response = await fetch('README.md');
                const markdown = await response.text();
                
                // Converting Markdown to HTML and placing it inside the container
                document.getElementById('dynamic-content').innerHTML = marked.parse(markdown);
            } catch (error) {
                document.getElementById('dynamic-content').innerHTML = "Error: Could not load content from README.md";
                console.error(error);
            }
        }

        // Run the function when the page loads
        loadContent();
    </script>

</body>
</html>
