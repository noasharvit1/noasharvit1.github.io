<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Sharvit - Personal Page</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- Your Original Styles --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
        }

        /* --- Styling the Content from README --- */
        /* This section makes the Markdown look like your original HTML design */
        
        #dynamic-content h1 { 
            color: #1a1a1a; 
            font-size: 2.2em; 
            margin-bottom: 5px;
        }
        
        #dynamic-content h3 { 
            color: #555; 
            font-weight: normal;
            margin-top: 0;
            margin-bottom: 30px;
        }

        #dynamic-content h2 { 
            color: #2c3e50; 
            font-size: 1.5em;
            border-left: 5px solid #3498db; /* Blue accent like a professional profile */
            padding-left: 15px;
            margin-top: 40px;
        }

        #dynamic-content hr { 
            border: 0; 
            height: 1px; 
            background: #eee; 
            margin: 25px 0; 
        }

        #dynamic-content p, #dynamic-content li {
            font-size: 1.1em;
            line-height: 1.7;
        }

        #dynamic-content ul {
            padding-left: 20px;
        }

        #dynamic-content strong {
            color: #2c3e50;
        }

        /* Styling for the Email/Contact links */
        #dynamic-content a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        #dynamic-content a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="dynamic-content">
            <p>Loading profile content...</p>
        </div>
    </div>

    <script>
        async function loadContent() {
            try {
                const response = await fetch('README.md');
                if (!response.ok) throw new Error("File not found");
                
                const markdown = await response.text();
                
                // Convert Markdown to HTML
                const htmlContent = marked.parse(markdown);
                
                // Inject into the page
                document.getElementById('dynamic-content').innerHTML = htmlContent;
            } catch (error) {
                document.getElementById('dynamic-content').innerHTML = 
                    "<p style='color:red;'>Error loading content. Please ensure README.md exists.</p>";
            }
        }

        loadContent();
    </script>

</body>
</html>
