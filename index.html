<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Sharvit - Personal Page</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* General layout styling - You can customize this as you wish */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            max-width: 850px; 
            margin: auto; 
            padding: 40px 20px; 
            color: #24292e;
        }
        #content { 
            border: 1px solid #e1e4e8; 
            padding: 30px; 
            border-radius: 6px; 
            background-color: #ffffff;
        }
        /* Style adjustments for images inside the content */
        #content img { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <div id="content">Loading profile...</div>

    <script>
        /**
         * Fetches the README.md file from the repository,
         * converts it to HTML, and injects it into the page.
         */
        async function loadMarkdownContent() {
            try {
                // Fetch the Markdown file from the root directory
                const response = await fetch('README.md');
                
                if (!response.ok) {
                    throw new Error("Could not retrieve the README.md file.");
                }

                const markdown = await response.text();
                
                // Use the Marked library to parse the text and update the DOM
                document.getElementById('content').innerHTML = marked.parse(markdown);
            } catch (error) {
                document.getElementById('content').innerHTML = "Failed to load content. Please try again later.";
                console.error("Error loading content:", error);
            }
        }

        // Initialize content loading on page load
        loadMarkdownContent();
    </script>

</body>
</html>
