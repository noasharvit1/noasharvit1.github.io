<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Sharvit | Professional Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --header-bg: #1a2332; /* הנייבי הכהה מהתמונה */
            --body-bg: #f0f2f5;
            --card-bg: #ffffff;
            --accent-blue: #0077b6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            direction: ltr;
        }

        /* החלק העליון הכחול */
        .top-banner {
            width: 100%;
            height: 250px;
            background-color: var(--header-bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 32px 32px; /* דוגמת הרשת העדינה מהתמונה */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .top-banner h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
        }

        .top-banner p {
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* הכרטיס הלבן המרכזי */
        .main-card {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            margin-top: -60px; /* גורם לכרטיס לעלות על הרקע הכחול */
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 50px;
            margin-bottom: 50px;
            min-height: 600px;
        }

        /* עיצוב התוכן שנשאב מה-Markdown */
        #content h1 { display: none; } /* מסתיר את השם אם הוא מופיע בתוך ה-README */
        
        #content h2 {
            font-size: 1.2rem;
            color: var(--header-bg);
            text-transform: uppercase;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #content p, #content li {
            color: #444;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        #content ul {
            padding-left: 20px;
        }

        #content a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        #content a:hover {
            text-decoration: underline;
        }

        /* התאמה לנייד */
        @media (max-width: 768px) {
            .main-card { padding: 25px; margin-top: -30px; }
            .top-banner h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="top-banner">
        <h1>Noa Sharvit</h1>
        <p>MSc Student | Weizmann Institute of Science</p>
    </div>

    <div class="main-card">
        <div id="content">
            Loading profile information...
        </div>
    </div>

    <script>
        async function loadReadme() {
            try {
                // הוספת סימן שאלה וזמן בסוף הכתובת מכריחה את הדפדפן להביא את הקובץ מחדש ולא מהזיכרון
                const response = await fetch('README.md?t=' + new Date().getTime());
                if (!response.ok) throw new Error('File not found');
                const text = await response.text();
                
                // המרה ל-HTML
                document.getElementById('content').innerHTML = marked.parse(text);
            } catch (error) {
                document.getElementById('content').innerHTML = "Unable to load README.md. Please ensure the file is in the same folder.";
            }
        }

        loadReadme();
    </script>

</body>
</html>
