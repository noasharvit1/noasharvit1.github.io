<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Sharvit | Professional Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #0f172a; 
            --accent-color: #0ea5e9;  
            --bg-light: #f1f5f9;     
            --text-main: #1e293b;    
            --text-muted: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            text-align: left;
        }

        header {
            background-color: var(--primary-color);
            background-image: 
                linear-gradient(30deg, #0f172a 12%, transparent 12.5%, transparent 87%, #0f172a 87.5%, #0f172a),
                linear-gradient(150deg, #0f172a 12%, transparent 12.5%, transparent 87%, #0f172a 87.5%, #0f172a),
                linear-gradient(30deg, #0f172a 12%, transparent 12.5%, transparent 87%, #0f172a 87.5%, #0f172a),
                linear-gradient(150deg, #0f172a 12%, transparent 12.5%, transparent 87%, #0f172a 87.5%, #0f172a),
                linear-gradient(60deg, #1e293b 25%, transparent 25.5%, transparent 75%, #1e293b 75%, #1e293b),
                linear-gradient(60deg, #1e293b 25%, transparent 25.5%, transparent 75%, #1e293b 75%, #1e293b);
            background-size: 80px 140px;
            color: white;
            padding: 100px 20px;
            text-align: center;
            border-bottom: 5px solid var(--accent-color);
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -2px;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .container {
            max-width: 800px;
            margin: -50px auto 80px;
            padding: 50px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* עיצוב התוכן שנכנס מה-Markdown */
        #content h2 {
            color: var(--primary-color);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 10px;
            margin-top: 40px;
        }

        /* התאמת מבנה ה-Markdown לעיצוב ה-Items */
        #content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
            margin-top: 30px;
        }

        #content p strong {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 0.85rem;
            display: block;
        }

        #content ul {
            list-style-type: none;
            padding-left: 0;
            margin-top: 15px;
            border-left: 3px solid var(--bg-light);
            padding-left: 25px;
        }

        #content ul li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        #content ul li::before {
            content: "→";
            color: var(--accent-color);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .contact-box {
            background: var(--primary-color);
            color: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            margin-top: 60px;
        }

        .contact-box a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            border: 2px solid var(--accent-color);
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .contact-box a:hover {
            background: var(--accent-color);
            color: var(--primary-color);
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; }
            .container { margin-top: -20px; padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 id="user-name">Noa Sharvit</h1>
        <p id="user-title">MSc Student | Weizmann Institute of Science</p>
    </header>

    <div class="container">
        <div id="content">Loading content...</div>

        <section id="contact" class="contact-box">
            <h3>Contact Info</h3>
            <a id="user-email" href="mailto:noa.sharvit@weizmann.ac.il">noa.sharvit@weizmann.ac.il</a>
        </section>
    </div>

    <script>
        async function loadContent() {
            try {
                const response = await fetch('README.md');
                const text = await response.text();
                // המרה מ-Markdown ל-HTML והזרקה למכולה
                document.getElementById('content').innerHTML = marked.parse(text);
            } catch (error) {
                document.getElementById('content').innerHTML = "Error loading content.";
                console.error(error);
            }
        }

        loadContent();
    </script>

</body>
</html>
