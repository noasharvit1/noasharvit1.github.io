<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Sharvit | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #1e1e26;
            --main-bg: #f4f7f9;
            --accent-color: #4a90e2;
            --card-bg: #ffffff;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Assistant', 'Inter', sans-serif;
            background-color: var(--main-bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - התפריט הצדי מהתמונה */
        nav {
            width: 80px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            color: white;
            flex-shrink: 0;
        }

        nav i {
            font-size: 1.5rem;
            margin-bottom: 30px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        nav i:hover { opacity: 1; color: var(--accent-color); }

        /* Main Content Area */
        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 60px 80px;
        }

        .header-section {
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -1px;
        }

        .status-badge {
            display: inline-block;
            background: #e1f0ff;
            color: var(--accent-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 10px;
            font-weight: 600;
        }

        /* עיצוב התוכן שנשאב מה-Markdown */
        #readme-content {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        /* הפיכת כותרות מה-README לכרטיסיות (Cards) */
        #readme-content h2 {
            grid-column: 1 / -1;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 40px;
            font-size: 1.5rem;
        }

        #readme-content p, #readme-content ul {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin: 0;
            border: 1px solid #edf2f7;
        }

        #readme-content ul { padding-right: 50px; }

        /* התאמה רספונסיבית */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; padding: 0; }
            nav i { margin-bottom: 0; }
            main { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <i class="fas fa-user"></i>
        <i class="fas fa-flask"></i>
        <i class="fas fa-code"></i>
        <i class="fas fa-envelope"></i>
    </nav>

    <main>
        <div class="header-section">
            <h1 id="user-name">Noa Sharvit</h1>
            <div class="status-badge">MSc Student @ Weizmann Institute</div>
        </div>

        <div id="readme-content">
            <p>טוען נתונים מה-README...</p>
        </div>
    </main>

    <script>
        async function fetchReadme() {
            try {
                // המרה לכתובת ה-Raw של ה-GitHub שלך
                // וודאי שהקובץ README.md נמצא באותו התיקייה
                const response = await fetch('README.md');
                const text = await response.text();
                
                // שימוש ב-marked כדי להפוך Markdown ל-HTML
                document.getElementById('readme-content').innerHTML = marked.parse(text);
            } catch (e) {
                document.getElementById('readme-content').innerHTML = "שגיאה בטעינת הנתונים.";
            }
        }
        fetchReadme();
    </script>

</body>
</html>
